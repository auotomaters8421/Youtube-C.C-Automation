services:
  - type: web
    name: youtube-automation-web
    env: python
    region: ohio # Default region, can be changed
    plan: free # Render free plan supports web services
    buildCommand: pip install -r requirements.txt && pip install -U yt-dlp
    startCommand: python main.py
    envVars:
      - fromGroup: youtube-automation-secrets
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SEEN_VIDEOS_PATH
        value: data/seen_videos.json
      # All generated scripts and MP3s go to the local directory inside the container
      - key: OUTPUT_DIR
        value: output

